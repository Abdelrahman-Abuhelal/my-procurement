services:
  mongo:
    image: mongo:7
    container_name: procurement-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: procurement-api
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - apps/api/.env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/procurement_portal}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: procurement-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 4000
    ports:
      - "${WEB_PORT:-4200}:4000"

  nginx:
    image: nginx:1.27-alpine
    container_name: procurement-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
