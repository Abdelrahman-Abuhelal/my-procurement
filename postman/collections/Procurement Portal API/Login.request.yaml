$kind: http-request
name: Login
method: POST
url: "{{baseUrl}}/auth/signin"
auth:
  type: bearer
  credentials:
    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWMzYmFhMDlhNmQ5NjU5Mjk5YjUxZDkiLCJpYXQiOjE3NzQ0MzQ5NzZ9.RaXYjGd1y9TcKe5rHgpj5cf4IWIFYIaS3RPBt5Cd-vw
order: 2000
headers:
  Content-Type: application/json
body:
  type: json
  content: |
    {
      "email": "admin2@example.com",
      "password": "Admin@1234"
    }
scripts:
  - type: afterResponse
    code: >-
      // Capture the JWT token from the sign-in response.

      // API returns: { user: { ... }, token: "..." }


      let json;

      try {
        json = pm.response.json();
      } catch (e) {
        json = null;
      }


      const token =
        (json && json.token) ||
        (json && json.accessToken) ||
        (json && json.data && json.data.token) ||
        (json && json.data && json.data.accessToken) ||
        null;

      pm.test('Login returned a token (if 200)', function () {
        if (pm.response.code === 200) {
          pm.expect(token).to.be.a('string').and.not.empty;
        } else {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 403, 404, 422, 500]);
        }
      });


      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });


      if (token) {
        pm.environment.set('accessToken', token);
      }
    language: text/javascript
