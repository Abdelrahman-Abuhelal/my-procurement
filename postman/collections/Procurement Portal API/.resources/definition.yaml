$kind: collection
name: Procurement Portal API
description: |-
  Starter REST JSON API collection for the Procurement Portal.
  
  Includes:
  - Health check
  - Login placeholder (captures JWT access token)
  - Authenticated "Me" profile request
variables:
  - key: baseUrl
    value: '{{baseUrl}}'
    description: Base URL for the API (resolved from the active environment)
scripts:
  - type: http:beforeRequest
    language: text/javascript
    code: |-
      // Attach Authorization: Bearer {{accessToken}} automatically when a token exists.
      // Skip for login/auth endpoints.
      const url = pm.request.url.toString();
      const isAuthEndpoint = /\/auth\/login\b/i.test(url);

      const token = pm.environment.get('accessToken');

      if (!isAuthEndpoint && token) {
        pm.request.headers.upsert({
          key: 'Authorization',
          value: `Bearer ${token}`
        });
      }

      // Ensure JSON content type for requests with a body
      const method = (pm.request.method || '').toUpperCase();
      const hasBody = ['POST', 'PUT', 'PATCH'].includes(method);
      if (hasBody) {
        pm.request.headers.upsert({
          key: 'Content-Type',
          value: 'application/json'
        });
      }
  - type: http:afterResponse
    language: text/javascript
    code: |-
      // Basic JSON response validation helper
      pm.test('Status code is 2xx/3xx/4xx (not a network error)', function () {
        pm.expect(pm.response.code).to.be.a('number');
      });

      // If response declares JSON, ensure it parses
      const ct = (pm.response.headers.get('Content-Type') || '').toLowerCase();
      if (ct.includes('application/json')) {
        pm.test('Response is valid JSON', function () {
          pm.response.json();
        });
      }
